<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Student Management System</h1>

    <div class="form-section">

        <input type="text" id="name" placeholder="Enter Student Name">

        <input type="text" id="roll" placeholder="Enter Roll Number">

        <input type="text" id="course" placeholder="Enter Course">

        <input type="number" id="marks" placeholder="Enter Marks">

        <button onclick="addStudent()">Add Student</button>

    </div>

    <div class="search-section">
        <input type="text" id="search" placeholder="Search Student" onkeyup="searchStudent()">
    </div>

    <div class="stats">
        <h3>Total Students: <span id="count">0</span></h3>
    </div>

    <table>

        <thead>
            <tr>
                <th>Name</th>
                <th>Roll No</th>
                <th>Course</th>
                <th>Marks</th>
                <th>Grade</th>
                <th>Actions</th>
            </tr>
        </thead>

        <tbody id="studentTable">

        </tbody>

    </table>

</div>

<script src="script.js"></script>

</body>
</html>
